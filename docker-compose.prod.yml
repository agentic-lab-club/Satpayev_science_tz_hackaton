networks:
  satpayevtz-aws:
    driver: bridge

volumes:
  postgres_data:

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8080}
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    env_file:
      - ${COMPOSE_ENV_FILE:-/opt/satpayevtz/runtime/env/.env.prod}
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - satpayevtz-aws

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ${COMPOSE_ENV_FILE:-/opt/satpayevtz/runtime/env/.env.prod}
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - satpayevtz-aws

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    command: ["-config=prod"]
    env_file:
      - ${COMPOSE_ENV_FILE:-/opt/satpayevtz/runtime/env/.env.prod}
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    volumes:
      - ${BACKEND_CONFIG_FILE:-/opt/satpayevtz/runtime/config/config.prod.yaml}:/app/config/config.prod.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - satpayevtz-aws

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${COMPOSE_ENV_FILE:-/opt/satpayevtz/runtime/env/.env.prod}
    environment:
      AI_SERVICE_ENV: production
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - satpayevtz-aws
