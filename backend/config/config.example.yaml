# =========================
# Backend
# =========================

server:
  http_port: 8080
  http_host: "0.0.0.0"

project:
  name: "Satpayev Science TZ"

database:
  host: "localhost"
  port: 5432
  user: "myuser"
  password: "password"
  name: "mydb"
  sslmode: "disable"

# development/staging/production
environment: "development"

gotenberg:
  url: "http://localhost:3000"

# Generates a high-entropy, base64-encoded string command:
# openssl rand -base64 16
auth:
  jwt_access_secret: "change-me"
  jwt_refresh_secret: "change-me-too"
  access_token_ttl_seconds: 3600
  refresh_token_ttl_seconds: 604800
  email_verification_code_ttl_seconds: 900

storage:
  provider: "s3"

  # credential_source controls how the S3-compatible client authenticates:
  # - "static": use access_key and secret_key from this config. Required for local MinIO.
  # - "iam": use AWS EC2 instance profile credentials. Use this on AWS EC2 for real S3.
  #
  # Local Docker Compose / MinIO example:
  endpoint: "minio:9000"
  region: "us-east-1"
  bucket: "application-files"
  credential_source: "static"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  use_ssl: false

  # AWS EC2 / S3 example:
  # endpoint: "your-bucket.s3.your-region.amazonaws.com"
  # region: "eu-north-1"
  # bucket: "your-terraform-uploads-bucket"
  # credential_source: "iam"
  # access_key: ""
  # secret_key: ""
  # use_ssl: true

email:
  enabled: false  # when false, registration auto-verifies users and disables verification codes
  mode: "stub"  # stub for dev, smtp for prod
  from_name: "Satpayev Science TZ"
  from_email: "noreply@example.com"  # your_email also here
  smtp_host: "smtp.example.com"  # e.g. google: smtp.gmail.com
  smtp_port: 587
  smtp_user: "your_email"
  smtp_pass: "your_password"

# =========================
# Modules and Services on internal/
# =========================


# =========================
# OBSERVABILITY SETTINGS
# =========================

# Logging configuration
logging:
  level: "debug"           # debug, info, warn, error
  format: "console"        # json (production) or console (development)
  output: "stdout"         # stdout, stderr, or file path
  time_format: "2006-01-02T15:04:05Z07:00"
  sensitive_paths:         # Endpoints with sensitive data - body_preview will be <redacted>
    - "/auth/register"
    - "/auth/login"
    - "/auth/refresh"
    - "/auth/verify-email"
    - "/docs"

# =========================
# SECURITY SETTINGS
# =========================

security:
  # CORS settings
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "*"                    # Allow all for development (restrict in production!)
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "PATCH"
    - "HEAD"
    - "OPTIONS"
  allowed_headers:
    - "Origin"
    - "Content-Type"
    - "Accept"
    - "Authorization"
    - "X-Request-ID"
    - "X-Correlation-ID"
  expose_headers:
    - "X-Request-ID"
    - "X-Correlation-ID"
  allow_credentials: false
  max_age: 300             # Preflight cache duration in seconds
  rate_limit_max: 100      # Maximum requests per window
  rate_limit_window_seconds: 60  # Time window in seconds
  request_timeout_seconds: 30
  trusted_proxies:
    - "127.0.0.1"
