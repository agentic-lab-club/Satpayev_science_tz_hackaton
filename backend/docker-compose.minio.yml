networks:
  satpayev-science-network:
    driver: bridge

volumes:
  minio_data:

services:
  # S3 Minio storage bucket
  minio:
    image: quay.io/minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: satpayev_science_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9002:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - satpayev-science-network

  # create/configure s3 minio bucket for local dev
  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: satpayev_science_minio_init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -ec "
      until /usr/bin/mc alias set local http://minio:9000 ${STORAGE_ACCESS_KEY} ${STORAGE_SECRET_KEY}; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing local/${STORAGE_BUCKET:-application-files};
      /usr/bin/mc anonymous set private local/${STORAGE_BUCKET:-application-files};
      "
    networks:
      - satpayev-science-network
