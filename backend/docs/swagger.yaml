    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://yourdomain.com/terms/
  title: Satpayev Science TZ Backend API
  version: "1.0"
paths:
  /api/v1/admin/reports/exports:
    post:
      consumes:
      - application/json
      description: Queue an export for approved submissions
      parameters:
      - description: Export payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.CreateReportExportRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.ReportExport'
      security:
      - BearerToken: []
      summary: Create report export
      tags:
      - '@tzworkflow'
  /api/v1/admin/review-submissions:
    get:
      description: List all pending and processed review submissions
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.ReviewSubmission'
            type: array
      security:
      - BearerToken: []
      summary: List review submissions
      tags:
      - '@tzworkflow'
  /api/v1/admin/review-submissions/{submission_id}/decision:
    post:
      consumes:
      - application/json
      description: Save an admin decision and final scorecard for a submission
      parameters:
      - description: Submission ID
        in: path
        name: submission_id
        required: true
        type: string
      - description: Decision payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.ReviewDecisionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.AdminReview'
      security:
      - BearerToken: []
      summary: Record review decision
      tags:
      - '@tzworkflow'
  /api/v1/healthcheck:
    get:
      description: Returns the application health status and dependency checks.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_healthcheck.HealthCheckResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_healthcheck.HealthCheckResponse'
      summary: Health check
      tags:
      - '@healthcheck'
  /api/v1/healthcheck/liveness:
    get:
      description: Returns whether the process is alive.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_healthcheck.LivenessResponse'
      summary: Liveness probe
      tags:
      - '@healthcheck'
  /api/v1/healthcheck/readiness:
    get:
      description: Returns whether the service is ready to serve traffic.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_healthcheck.ReadinessResponse'
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness probe
      tags:
      - '@healthcheck'
  /api/v1/projects:
    get:
      description: List projects visible to the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.Project'
            type: array
      security:
      - BearerToken: []
      summary: List projects
      tags:
      - '@tzworkflow'
    post:
      consumes:
      - application/json
      description: Create a new scientific TZ project
      parameters:
      - description: Project payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.CreateProjectRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.Project'
      security:
      - BearerToken: []
      summary: Create project
      tags:
      - '@tzworkflow'
  /api/v1/projects/{project_id}:
    get:
      description: Get project by id
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.Project'
      security:
      - BearerToken: []
      summary: Get project
      tags:
      - '@tzworkflow'
  /api/v1/projects/{project_id}/chat-sessions:
    post:
      consumes:
      - application/json
      description: Create a project-bound chat session
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Chat session payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.CreateChatSessionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.ChatSession'
      security:
      - BearerToken: []
      summary: Create chat session
      tags:
      - '@tzworkflow'
  /api/v1/projects/{project_id}/chat-sessions/{session_id}/messages:
    post:
      consumes:
      - application/json
      description: Send a chat message and store the AI response
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: string
      - description: Chat message payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.SendChatMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.SendChatMessageResponse'
      security:
      - BearerToken: []
      summary: Send chat message
      tags:
      - '@tzworkflow'
  /api/v1/projects/{project_id}/submit-for-review:
    post:
      consumes:
      - application/json
      description: Create a review submission for a project version
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Review submission payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.SubmitForReviewRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.ReviewSubmission'
      security:
      - BearerToken: []
      summary: Submit for review
      tags:
      - '@tzworkflow'
  /api/v1/projects/{project_id}/versions:
    get:
      description: List document versions for a project
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.DocumentVersion'
            type: array
      security:
      - BearerToken: []
      summary: List versions
      tags:
      - '@tzworkflow'
    post:
      consumes:
      - application/json
      description: Create a new document version from an uploaded file asset
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Version payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.CreateVersionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.DocumentVersion'
      security:
      - BearerToken: []
      summary: Create version
      tags:
      - '@tzworkflow'
  /api/v1/projects/{project_id}/versions/{version_id}/analysis/latest:
    get:
      description: Get the latest stored analysis for a document version
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Version ID
        in: path
        name: version_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.LatestAnalysisResponse'
      security:
      - BearerToken: []
      summary: Latest analysis
      tags:
      - '@tzworkflow'
  /api/v1/projects/{project_id}/versions/{version_id}/analyze:
    post:
      description: Send a document version to AI-service and persist the analysis
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: string
      - description: Version ID
        in: path
        name: version_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_tzworkflow.LatestAnalysisResponse'
      security:
      - BearerToken: []
      summary: Analyze version
      tags:
      - '@tzworkflow'
  /assets:
    post:
      consumes:
      - multipart/form-data
      description: Uploads a file for the authenticated applicant and creates an unattached
        application file record.
      parameters:
      - description: File type
        in: formData
        name: file_type
        required: true
        type: string
      - description: Binary file payload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_assets.Response'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerToken: []
      summary: Upload asset
      tags:
      - '@assets'
  /assets/{id}:
    get:
      description: Returns the uploaded asset binary payload for the owning applicant
        or admin reviewer.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerToken: []
      summary: Get uploaded asset by ID
      tags:
      - '@assets'
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns access and refresh tokens. When
        email verification is enabled, the user must be verified.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_auth.TokenResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Login with email and password
      tags:
      - '@auth'
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the provided refresh token session.
      parameters:
      - description: Logout payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_auth.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_auth.MessageResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Logout current refresh session
      tags:
      - '@auth'
  /auth/me:
    get:
      description: Returns the current user profile extracted from the bearer access
        token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_auth.meResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerToken: []
      summary: Get current authenticated user
      tags:
      - '@auth'
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Rotates the refresh session and returns a new access and refresh
        token pair.
      parameters:
      - description: Refresh token payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_auth.TokenResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Refresh access token
      tags:
      - '@auth'
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account and conditionally issues an email verification
        code.
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_auth.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Register applicant account
      tags:
      - '@auth'
  /auth/resend-code:
    post:
      consumes:
      - application/json
      description: Issues a new verification code for an existing unverified user.
      parameters:
      - description: Resend code payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_auth.ResendCodeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_auth.MessageResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Resend email verification code
      tags:
      - '@auth'
  /auth/verify-email:
    post:
      consumes:
      - application/json
      description: Verifies a user's email address using the latest active verification
        code.
      parameters:
      - description: Email verification payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_auth.VerifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github.com_agentic-lab-club_Satpayev_science_tz_hackaton_backend_internal_auth.MessageResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Verify email with code
      tags:
      - '@auth'
  /health:
    get:
      description: Returns the application health status and dependency checks.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_healthcheck.HealthCheckResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/internal_healthcheck.HealthCheckResponse'
      summary: Health check
      tags:
      - '@healthcheck'
  /health/liveness:
    get:
      description: Returns whether the process is alive.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_healthcheck.LivenessResponse'
      summary: Liveness probe
      tags:
      - '@healthcheck'
  /health/readiness:
    get:
      description: Returns whether the service is ready to serve traffic.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_healthcheck.ReadinessResponse'
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Readiness probe
      tags:
      - '@healthcheck'
schemes:
- http
- https
securityDefinitions:
  BearerToken:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
