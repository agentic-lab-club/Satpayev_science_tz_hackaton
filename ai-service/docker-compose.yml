services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: satpayevtz_ai_service
    env_file:
      - .env
    ports:
      - "${AI_SERVICE_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
