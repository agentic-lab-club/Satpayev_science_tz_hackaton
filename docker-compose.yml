networks:
  satpayev-sciencetz:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  # this go cache for Backend Golang Test
  go-mod-cache: {}
  go-build-cache: {}

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8080}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: satpayevtz_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - satpayev-sciencetz

  postgres:
    image: postgres:17-alpine
    container_name: satpayevtz_postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - satpayev-sciencetz

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: satpayevtz_backend
    env_file:
      - .env
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    restart: unless-stopped
    command: ["-config=local"]
    volumes:
      - ./backend/config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - satpayev-sciencetz

  # for Running Backend Tests:
  # docker compose run --rm --no-deps backend-test go test ./internal/healthcheck
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    working_dir: /src
    env_file:
      - .env
    volumes:
      - .:/src
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: ["sh"]
    networks:
      - satpayev-sciencetz

  # s3 minio storage bucket
  minio:
    image: quay.io/minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: satpayevtz_s3_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9002:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - satpayev-sciencetz

  # create/configure s3 minio bucket for local dev
  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: satpayevtz_s3_minio_init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -ec "
      until /usr/bin/mc alias set local http://minio:9000 ${STORAGE_ACCESS_KEY} ${STORAGE_SECRET_KEY}; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing local/${STORAGE_BUCKET:-application-files};
      /usr/bin/mc anonymous set private local/${STORAGE_BUCKET:-application-files};
      "
    networks:
      - satpayev-sciencetz
